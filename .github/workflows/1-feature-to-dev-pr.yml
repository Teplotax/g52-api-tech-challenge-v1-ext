name: "1 - [FEAT] Build & PR"

on:
  push:
    branches:
      - 'feature/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  Create:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create PR if it doesn't exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"

          echo "Checking for existing PR from $BRANCH to develop..."

          PR_EXISTS=$(gh pr list \
            --head "$BRANCH" \
            --base develop \
            --state open \
            --json number \
            --jq 'length')

          if [ "$PR_EXISTS" -eq "0" ]; then
            echo "No PR found. Creating one..."

            gh pr create \
              --base develop \
              --head "$BRANCH" \
              --title "Auto PR: $BRANCH → develop" \
              --body "Automatically created PR from $BRANCH"
          else
            echo "PR already exists. Skipping."
          fi