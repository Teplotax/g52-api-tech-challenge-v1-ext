        "404":
          $ref: "#/components/responses/404"
        "405":
          $ref: "#/components/responses/405"
        "500":
          $ref: "#/components/responses/500"
        "503":
          $ref: "#/components/responses/503"
      #      security:
      #        - APIGatewaySTSAuthorizer:
      #            - none
      x-amazon-apigateway-integration:
        timeoutInMillis: 14000
        type: "http_proxy"
        httpMethod: "PUT"
        #        credentials: "arn:aws:iam::${pipes_deploy_aws_env_account}:role/iamsr/role-gateway-invoke-authorizer"
        uri: "http://${loadBalancerDnsMain}/clientes/{clienteId}"
        responses:
          default:
            statusCode: "503"
        passthroughBehavior: "when_no_match"
        connectionType: "VPC_LINK"
        connectionId: "${vpclink}"
        requestParameters:
          integration.request.path.clienteId: "method.request.path.clienteId"
          integration.request.header.x-correlationid: "method.request.header.x-correlationid"
      x-amazon-apigateway-request-validator: params-only
    get:
      tags:
        - Clientes
      summary: Consultar Cliente
      description: |
        Endpoint para consulta de cliente por clienteId
      operationId: get/clientes/{clienteId}
      parameters:
        - $ref: "#/components/parameters/x_correlationid"
        - name: clienteId
          in: path
          description: Identificador do cliente
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Cliente consultado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FindClienteResponse"
              examples:
                FindClienteResponse:
                  $ref: "#/components/examples/FindClienteResponse"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "405":
          $ref: "#/components/responses/405"
        "500":
          $ref: "#/components/responses/500"
        "503":
          $ref: "#/components/responses/503"
      #      security:
      #        - APIGatewaySTSAuthorizer:
      #            - none
      x-amazon-apigateway-integration:
        timeoutInMillis: 14000
        type: "http_proxy"
        httpMethod: "GET"
        #        credentials: "arn:aws:iam::${pipes_deploy_aws_env_account}:role/iamsr/role-gateway-invoke-authorizer"
        uri: "http://${loadBalancerDnsMain}/clientes/{clienteId}"
        responses:
          default:
            statusCode: "503"
        passthroughBehavior: "when_no_match"
        connectionType: "VPC_LINK"
        connectionId: "${vpclink}"
        requestParameters:
          integration.request.path.clienteId: "method.request.path.clienteId"
          integration.request.header.x-correlationid: "method.request.header.x-correlationid"
      x-amazon-apigateway-request-validator: params-only
    delete:
      tags:
        - Clientes
      summary: Deletar Cliente
      description: |
        Endpoint para deleção de cliente por clienteId
      operationId: delete/clientes/{clienteId}
      parameters:
        - $ref: "#/components/parameters/x_correlationid"
        - name: clienteId
          in: path
          description: Identificador do cliente
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "204":
          $ref: "#/components/responses/204"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "405":
          $ref: "#/components/responses/405"
        "500":
          $ref: "#/components/responses/500"
        "503":
          $ref: "#/components/responses/503"
      #      security:
      #        - APIGatewaySTSAuthorizer:
      #            - none
      x-amazon-apigateway-integration:
        timeoutInMillis: 14000
        type: "http_proxy"
        httpMethod: "DELETE"
        #        credentials: "arn:aws:iam::${pipes_deploy_aws_env_account}:role/iamsr/role-gateway-invoke-authorizer"
