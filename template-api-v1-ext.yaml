openapi: 3.0.0
info:
  title: API G52 Tech Challenge
  description: |
    API de gerenciamento de ordens de serviço para oficinas mecânicas. Permite controlar o ciclo de vida
    completo de uma OS — desde a abertura até a entrega do veículo — além de gerenciar clientes, veículos,
    peças, insumos e serviços cadastrados.

    ---

    ## Ciclo de vida de uma OS

    Toda OS percorre um fluxo de status bem definido. As transições válidas são:

    | De | Para | Ação |
    |----|------|------|
    | `RECEBIDA` | `EM_DIAGNOSTICO` | Iniciar diagnóstico |
    | `EM_DIAGNOSTICO` | `AGUARDANDO_APROVACAO` | Solicitar aprovação — envia orçamento por e-mail ao cliente |
    | `AGUARDANDO_APROVACAO` | `APROVADA` | Cliente aprova o orçamento (total ou parcial) |
    | `APROVADA` | `EM_EXECUCAO` | Iniciar execução dos serviços |
    | `EM_EXECUCAO` | `FINALIZADA` | Finalizar execução — consome estoque real e libera reservas |
    | `FINALIZADA` | `ENTREGUE` | Entregar veículo — envia nota fiscal por e-mail e limpa tagChave |
    | `CANCELADA` | `DEVOLVIDO` | Devolver veículo fisicamente — limpa tagChave |
    | Qualquer status até `FINALIZADA` | `CANCELADA` | Cancelar OS — libera reservas de estoque |

    > `ENTREGUE` e `DEVOLVIDO` são status terminais — nenhuma transição é permitida a partir deles.

    ---

    ## Gestão de estoque

    O estoque de peças e insumos é controlado em duas camadas:

    - **Estoque reservado** (`estoqueReservado`): reservado ao adicionar serviços à OS. Liberado ao cancelar ou finalizar.
    - **Estoque real** (`estoque`): consumido definitivamente apenas na **finalização** da OS.

    Ao **cancelar** uma OS, o comportamento de liberação depende do status atual:
    - Antes de `APROVADA` (RECEBIDA, EM_DIAGNOSTICO, AGUARDANDO_APROVACAO): libera a reserva de **todos** os serviços.
    - A partir de `APROVADA` (APROVADA, EM_EXECUCAO): libera apenas a reserva dos serviços **aprovados**.

    ---

    ## Aprovação do orçamento

    Ao solicitar aprovação, o sistema:
    1. Altera o status para `AGUARDANDO_APROVACAO`.
    2. Gera o orçamento em PDF e envia ao cliente por e-mail (SMTP).
    3. Inclui no e-mail um link com token HMAC assinado — sem necessidade de login.

    O cliente seleciona os serviços que deseja aprovar e confirma. A aprovação pode ser total ou parcial.

    ---

    ## Recursos

    | Recurso | Descrição |
    |---------|-----------|
    | **Ordens de Serviço** | Ciclo de vida completo da OS |
    | **Clientes** | Cadastro e consulta de clientes |
    | **Veículos** | Cadastro de veículos vinculados a clientes |
    | **Peças** | Cadastro de peças com controle de estoque |
    | **Insumos** | Cadastro de insumos com controle de estoque |
    | **Serviços** | Catálogo de serviços oferecidos pela oficina |
    | **Estoque** | Entrada e saída de estoque por EAN (batch) |
  version: 1.0.0

servers:
  - url: https://api.example.com/v1
    description: Development

paths:
  /ordensDeServico:
    post:
      tags:
        - Ordens de Serviço
      summary: Criar OS
      description: |
        Cria uma nova OS com status inicial `RECEBIDA`.
        Calcula automaticamente o preço total com base nos serviços desejados informados.
        Reserva estoque das peças e insumos vinculados a cada serviço.
      operationId: post/ordensDeServico
      parameters:
        - $ref: "#/components/parameters/x_correlationid"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOSRequest"
            examples:
              CreateOSRequest:
                $ref: "#/components/examples/CreateOSRequest"
      responses:
        "201":
          description: Ordem de Serviço criada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOSResponse"
              examples:
                CreateOSResponse:
                  $ref: "#/components/examples/CreateOSResponse"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "405":
          $ref: "#/components/responses/405"
        "500":
          $ref: "#/components/responses/500"
        "503":
          $ref: "#/components/responses/503"
      #      security:
      #        - APIGatewaySTSAuthorizer:
      #            - none
      x-amazon-apigateway-integration:
        timeoutInMillis: 14000
        type: "http_proxy"
        httpMethod: "POST"
        #        credentials: "arn:aws:iam::${pipes_deploy_aws_env_account}:role/iamsr/role-gateway-invoke-authorizer"
        uri: "http://${loadBalancerDnsMain}/ordensDeServico"
        responses:
          default:
            statusCode: "503"
        passthroughBehavior: "when_no_match"
        connectionType: "VPC_LINK"
        connectionId: "${vpclink}"
        requestParameters:
          integration.request.header.x-correlationid: "method.request.header.x-correlationid"
      x-amazon-apigateway-request-validator: params-only
    get:
      tags:
        - Ordens de Serviço
      summary: Listar OS
      description: |
        Retorna uma lista paginada de ordens de serviço.
        Filtros opcionais: `placa`, `documentoCliente`, `status`, `dataInicio`, `dataFim`.
      operationId: get/ordensDeServico
      parameters:
        - $ref: "#/components/parameters/x_correlationid"
        - name: placa
          in: query
          description: Placa do veículo para filtrar
          required: false
          schema:
            type: string
        - name: documentoCliente
          in: query
          description: Documento do cliente para filtrar
          required: false
          schema:
            type: string
        - name: status
          in: query
          description: Status da OS para filtrar
          required: false
          schema:
            type: string
            enum:
              - RECEBIDA
              - EM_DIAGNOSTICO
              - AGUARDANDO_APROVACAO
              - APROVADA
              - EM_EXECUCAO
              - FINALIZADA
              - ENTREGUE
              - CANCELADA
              - DEVOLVIDO
        - name: dataInicio
          in: query
          description: Data de início do range (ex. 2026-06-19)
          required: false
          schema:
            type: string
            format: date
        - name: dataFim
          in: query
          description: Data de fim do range (ex. 2026-06-19)
          required: false
          schema:
            type: string
            format: date
        - name: page
          in: query
          description: Número da página
          required: false
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          description: Número de ordens de serviço por página
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Ordens de Serviço listadas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOSResponse"
              examples:
                ListOSResponse:
                  $ref: "#/components/examples/ListOSResponse"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "405":
          $ref: "#/components/responses/405"
        "500":
          $ref: "#/components/responses/500"
        "503":
          $ref: "#/components/responses/503"
      #      security:
      #        - APIGatewaySTSAuthorizer:
      #            - none
      x-amazon-apigateway-integration:
        timeoutInMillis: 14000
        type: "http_proxy"
        httpMethod: "GET"
        #        credentials: "arn:aws:iam::${pipes_deploy_aws_env_account}:role/iamsr/role-gateway-invoke-authorizer"
        uri: "http://${loadBalancerDnsMain}/ordensDeServico"
        responses:
          default:
            statusCode: "503"
        passthroughBehavior: "when_no_match"
        connectionType: "VPC_LINK"
        connectionId: "${vpclink}"
        requestParameters:
          integration.request.querystring.placa: "method.request.querystring.placa"
          integration.request.querystring.documentoCliente: "method.request.querystring.documentoCliente"
          integration.request.querystring.status: "method.request.querystring.status"
          integration.request.querystring.dataInicio: "method.request.querystring.dataInicio"
          integration.request.querystring.dataFim: "method.request.querystring.dataFim"
          integration.request.querystring.page: "method.request.querystring.page"
          integration.request.querystring.size: "method.request.querystring.size"
          integration.request.header.x-correlationid: "method.request.header.x-correlationid"
      x-amazon-apigateway-request-validator: params-only
  /ordensDeServico/{osId}:
    get:
      tags:
        - Ordens de Serviço
      summary: Consultar OS
      description: |
        Retorna os detalhes completos de uma OS, incluindo serviços, peças, insumos e histórico de status.
      operationId: get/ordensDeServico/{osId}
      parameters:
        - $ref: "#/components/parameters/x_correlationid"
        - name: osId
          in: path
          description: Identificador da ordem de serviço
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Ordem de Serviço consultada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FindOSResponse"
              examples:
                FindOSResponse:
                  $ref: "#/components/examples/FindOSResponse"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "405":
          $ref: "#/components/responses/405"
        "500":
          $ref: "#/components/responses/500"
        "503":
          $ref: "#/components/responses/503"
      #      security:
      #        - APIGatewaySTSAuthorizer:
      #            - none
      x-amazon-apigateway-integration:
        timeoutInMillis: 14000
        type: "http_proxy"
        httpMethod: "GET"
        #        credentials: "arn:aws:iam::${pipes_deploy_aws_env_account}:role/iamsr/role-gateway-invoke-authorizer"
        uri: "http://${loadBalancerDnsMain}/ordensDeServico/{osId}"
        responses:
          default:
            statusCode: "503"
        passthroughBehavior: "when_no_match"
        connectionType: "VPC_LINK"
        connectionId: "${vpclink}"
        requestParameters:
          integration.request.path.osId: "method.request.path.osId"
          integration.request.header.x-correlationid: "method.request.header.x-correlationid"
      x-amazon-apigateway-request-validator: params-only
  /ordensDeServico/{osId}/diagnosticar:
    post:
      tags:
        - Ordens de Serviço
      summary: Diagnosticar OS
      description: |
        Inicia o diagnóstico da OS, alterando o status de `RECEBIDA` para `EM_DIAGNOSTICO`.
        A partir deste status é possível adicionar serviços necessários e adicionais identificados pelo mecânico.
      operationId: post/ordensDeServico/{osId}/diagnosticar
      parameters:
        - $ref: "#/components/parameters/x_correlationid"
        - name: osId
          in: path
          description: Identificador da ordem de serviço
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Ordem de Serviço diagnosticada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluateOSResponse"
              examples:
                EvaluateOSResponse:
                  $ref: "#/components/examples/EvaluateOSResponse"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "405":
          $ref: "#/components/responses/405"
        "422":
          $ref: "#/components/responses/422"
        "500":
          $ref: "#/components/responses/500"
        "503":
          $ref: "#/components/responses/503"
      #      security:
      #        - APIGatewaySTSAuthorizer:
      #            - none
      x-amazon-apigateway-integration:
        timeoutInMillis: 14000
        type: "http_proxy"
        httpMethod: "POST"
        #        credentials: "arn:aws:iam::${pipes_deploy_aws_env_account}:role/iamsr/role-gateway-invoke-authorizer"
        uri: "http://${loadBalancerDnsMain}/ordensDeServico/{osId}/diagnosticar"
        responses:
          default:
            statusCode: "503"
        passthroughBehavior: "when_no_match"
        connectionType: "VPC_LINK"
        connectionId: "${vpclink}"
        requestParameters:
          integration.request.path.osId: "method.request.path.osId"
          integration.request.header.x-correlationid: "method.request.header.x-correlationid"
      x-amazon-apigateway-request-validator: params-only
  /ordensDeServico/{osId}/adicionarServicos:
    post:
      tags:
        - Ordens de Serviço
      summary: Adicionar serviços à OS
      description: |
        Adiciona serviços necessários e/ou adicionais à OS durante o diagnóstico (`EM_DIAGNOSTICO`).
        Calcula o preço de cada serviço e reserva o estoque das peças e insumos envolvidos.
        O preço total da OS é recalculado após cada adição.
      operationId: post/ordensDeServico/{osId}/adicionarServicos
      parameters:
        - $ref: "#/components/parameters/x_correlationid"
        - name: osId
          in: path
          description: Identificador da ordem de serviço
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddServicosRequest"
            examples:
              AddServicosRequest:
                $ref: "#/components/examples/AddServicosRequest"
      responses:
        "200":
          description: Serviços adicionados à Ordem de Serviço
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddServicosResponse"
              examples:
                AddServicosResponse:
                  $ref: "#/components/examples/AddServicosResponse"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "405":
          $ref: "#/components/responses/405"
        "422":
          $ref: "#/components/responses/422"
        "500":
          $ref: "#/components/responses/500"
        "503":
          $ref: "#/components/responses/503"
      #      security:
      #        - APIGatewaySTSAuthorizer:
      #            - none
      x-amazon-apigateway-integration:
        timeoutInMillis: 14000
        type: "http_proxy"
        httpMethod: "POST"
        #        credentials: "arn:aws:iam::${pipes_deploy_aws_env_account}:role/iamsr/role-gateway-invoke-authorizer"
        uri: "http://${loadBalancerDnsMain}/ordensDeServico/{osId}/adicionarServicos"
        responses:
          default:
            statusCode: "503"
        passthroughBehavior: "when_no_match"
        connectionType: "VPC_LINK"
        connectionId: "${vpclink}"
        requestParameters:
          integration.request.path.osId: "method.request.path.osId"
          integration.request.header.x-correlationid: "method.request.header.x-correlationid"
      x-amazon-apigateway-request-validator: params-only
  /ordensDeServico/{osId}/solicitarAprovacao:
    post:
      tags:
        - Ordens de Serviço
      summary: Solicitar aprovação da OS
      description: |
        Envia o orçamento ao cliente por e-mail e altera o status da OS para AGUARDANDO_APROVACAO.
        O e-mail contém um link com token HMAC para o cliente aprovar ou rejeitar serviços individualmente.
      operationId: post/ordensDeServico/{osId}/solicitarAprovacao
      parameters:
        - $ref: "#/components/parameters/x_correlationid"
        - name: osId
          in: path
          description: Identificador da ordem de serviço
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Solicitação de aprovação enviada com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestApprovalResponse"
              examples:
                RequestApprovalResponse:
                  $ref: "#/components/examples/RequestApprovalResponse"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "405":
          $ref: "#/components/responses/405"
        "422":
          $ref: "#/components/responses/422"
        "500":
          $ref: "#/components/responses/500"
        "503":
          $ref: "#/components/responses/503"
      x-amazon-apigateway-integration:
        timeoutInMillis: 14000
        type: "http_proxy"
        httpMethod: "POST"
        uri: "http://${loadBalancerDnsMain}/ordensDeServico/{osId}/solicitarAprovacao"
        responses:
          default:
            statusCode: "503"
        passthroughBehavior: "when_no_match"
        connectionType: "VPC_LINK"
        connectionId: "${vpclink}"
        requestParameters:
          integration.request.path.osId: "method.request.path.osId"
          integration.request.header.x-correlationid: "method.request.header.x-correlationid"
      x-amazon-apigateway-request-validator: params-only
  /ordensDeServico/{osId}/aprovar:
    post:
      tags:
        - Ordens de Serviço
      summary: Aprovar OS
      description: |
        Aprova a ordem de serviço alterando seu status para APROVADA.
        Se o corpo da requisição contiver uma lista de IDs em `servicosAprovados`, apenas esses serviços serão aprovados (aprovação parcial).
        Se o corpo for omitido ou a lista estiver vazia, todos os serviços serão aprovados.
      operationId: post/ordensDeServico/{osId}/aprovar
      parameters:
        - $ref: "#/components/parameters/x_correlationid"
        - name: osId
          in: path
          description: Identificador da ordem de serviço
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveOSRequest"
            examples:
              ApproveOSRequest:
                $ref: "#/components/examples/ApproveOSRequest"
      responses:
        "200":
          description: Ordem de Serviço aprovada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApproveOSResponse"
              examples:
                ApproveOSResponse:
                  $ref: "#/components/examples/ApproveOSResponse"
                ApproveOSParcialResponse:
                  $ref: "#/components/examples/ApproveOSParcialResponse"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "405":
          $ref: "#/components/responses/405"
        "422":
          $ref: "#/components/responses/422"
        "500":
          $ref: "#/components/responses/500"
        "503":
          $ref: "#/components/responses/503"
      #      security:
      #        - APIGatewaySTSAuthorizer:
      #            - none
      x-amazon-apigateway-integration:
        timeoutInMillis: 14000
        type: "http_proxy"
        httpMethod: "POST"
        #        credentials: "arn:aws:iam::${pipes_deploy_aws_env_account}:role/iamsr/role-gateway-invoke-authorizer"
        uri: "http://${loadBalancerDnsMain}/ordensDeServico/{osId}/aprovar"
        responses:
          default:
            statusCode: "503"
        passthroughBehavior: "when_no_match"
        connectionType: "VPC_LINK"
        connectionId: "${vpclink}"
        requestParameters:
          integration.request.path.osId: "method.request.path.osId"
          integration.request.header.x-correlationid: "method.request.header.x-correlationid"
      x-amazon-apigateway-request-validator: params-only

  /ordensDeServico/{osId}/executar:
    post:
      tags:
        - Ordens de Serviço
      summary: Iniciar execução da OS
      description: |
        Inicia a execução da OS, alterando o status de `APROVADA` para `EM_EXECUCAO`.
        A partir deste ponto apenas os serviços aprovados serão executados.
      operationId: post/ordensDeServico/{osId}/executar
      parameters:
        - $ref: "#/components/parameters/x_correlationid"
        - name: osId
          in: path
          description: Identificador da ordem de serviço
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Execução da Ordem de Serviço iniciada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecuteOSResponse"
              examples:
                ExecuteOSResponse:
                  $ref: "#/components/examples/ExecuteOSResponse"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "405":
          $ref: "#/components/responses/405"
        "422":
          $ref: "#/components/responses/422"
        "500":
          $ref: "#/components/responses/500"
        "503":
          $ref: "#/components/responses/503"
      x-amazon-apigateway-integration:
        timeoutInMillis: 14000
        type: "http_proxy"
        httpMethod: "POST"
        uri: "http://${loadBalancerDnsMain}/ordensDeServico/{osId}/executar"
        responses:
          default:
            statusCode: "503"
        passthroughBehavior: "when_no_match"
        connectionType: "VPC_LINK"
        connectionId: "${vpclink}"
        requestParameters:
          integration.request.path.osId: "method.request.path.osId"
          integration.request.header.x-correlationid: "method.request.header.x-correlationid"
      x-amazon-apigateway-request-validator: params-only
  /ordensDeServico/{osId}/finalizar:
    post:
      tags:
        - Ordens de Serviço
      summary: Finalizar OS
      description: |
        Finaliza a OS, alterando o status de `EM_EXECUCAO` para `FINALIZADA`.
        Para cada serviço aprovado: consome o estoque real (`estoque`) e libera a reserva (`estoqueReservado`) das peças e insumos.
        Após finalizar, a OS aguarda entrega física do veículo.
      operationId: post/ordensDeServico/{osId}/finalizar
      parameters:
        - $ref: "#/components/parameters/x_correlationid"
        - name: osId
          in: path
          description: Identificador da ordem de serviço
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Ordem de Serviço finalizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinalizeOSResponse"
              examples:
                FinalizeOSResponse:
                  $ref: "#/components/examples/FinalizeOSResponse"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "405":
          $ref: "#/components/responses/405"
        "422":
          $ref: "#/components/responses/422"
        "500":
          $ref: "#/components/responses/500"
        "503":
          $ref: "#/components/responses/503"
      x-amazon-apigateway-integration:
        timeoutInMillis: 14000
        type: "http_proxy"
        httpMethod: "POST"
        uri: "http://${loadBalancerDnsMain}/ordensDeServico/{osId}/finalizar"
        responses:
          default:
            statusCode: "503"
        passthroughBehavior: "when_no_match"
        connectionType: "VPC_LINK"
