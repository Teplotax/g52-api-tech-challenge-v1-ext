paths:
  /clientes:
    post:
      tags:
        - Clientes
      summary: Criar Cliente
      description: |
        Endpoint para criar um cliente
      operationId: post/clientes
      parameters:
        - $ref: "#/components/parameters/x_correlationid"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClienteRequest"
            examples:
              CreateClienteRequest:
                $ref: "#/components/examples/CreateClienteRequest"
      responses:
        "201":
          description: Cliente criado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateClienteResponse"
              examples:
                CreateClienteResponse:
                  $ref: "#/components/examples/CreateClienteResponse"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "405":
          $ref: "#/components/responses/405"
        "500":
          $ref: "#/components/responses/500"
        "503":
          $ref: "#/components/responses/503"
      #      security:
      #        - APIGatewaySTSAuthorizer:
      #            - none
      x-amazon-apigateway-integration:
        timeoutInMillis: 14000
        type: "http_proxy"
        httpMethod: "POST"
        #        credentials: "arn:aws:iam::${pipes_deploy_aws_env_account}:role/iamsr/role-gateway-invoke-authorizer"
        uri: "http://${loadBalancerDnsMain}/clientes"
        responses:
          default:
            statusCode: "503"
        passthroughBehavior: "when_no_match"
        connectionType: "VPC_LINK"
        connectionId: "${vpclink}"
        requestParameters:
          integration.request.header.x-correlationid: "method.request.header.x-correlationid"
      x-amazon-apigateway-request-validator: params-only
    get:
      tags:
        - Clientes
      summary: Listar Clientes
      description: |
        Endpoint para listar de cliente por clienteId
      operationId: get/clientes
      parameters:
        - $ref: "#/components/parameters/x_correlationid"
        - name: page
          in: query
          description: Número da página
          required: false
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          description: Número de clientes por página
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Clientes listados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListClientesResponse"
              examples:
                ListClientesResponse:
                  $ref: "#/components/examples/ListClientesResponse"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "405":
          $ref: "#/components/responses/405"
        "500":
          $ref: "#/components/responses/500"
        "503":
          $ref: "#/components/responses/503"
      #      security:
      #        - APIGatewaySTSAuthorizer:
      #            - none
      x-amazon-apigateway-integration:
        timeoutInMillis: 14000
        type: "http_proxy"
        httpMethod: "GET"
        #        credentials: "arn:aws:iam::${pipes_deploy_aws_env_account}:role/iamsr/role-gateway-invoke-authorizer"
        uri: "http://${loadBalancerDnsMain}/clientes"
        responses:
          default:
            statusCode: "503"
        passthroughBehavior: "when_no_match"
        connectionType: "VPC_LINK"
        connectionId: "${vpclink}"
        requestParameters:
          integration.request.querystring.page: "method.request.querystring.page"
          integration.request.querystring.size: "method.request.querystring.size"
          integration.request.header.x-correlationid: "method.request.header.x-correlationid"
      x-amazon-apigateway-request-validator: params-only
