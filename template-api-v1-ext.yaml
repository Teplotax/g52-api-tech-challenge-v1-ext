      tags:
        - Clientes
      summary: Atualizar Cliente
      description: |
        Endpoint para atualizar um cliente
      operationId: put/clientes/{clienteId}
      parameters:
        - $ref: "#/components/parameters/x_correlationid"
        - name: clienteId
          in: path
          description: Identificador do cliente
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClienteRequest"
            examples:
              UpdateClienteRequest:
