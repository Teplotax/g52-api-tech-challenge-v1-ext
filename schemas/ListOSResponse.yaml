type: object
properties:
  content:
    type: array
    description: Lista de ordens de serviço da página atual
    items:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Identificador da OS
        status:
          type: string
          description: Status atual da OS
          enum:
            - RECEBIDA
            - EM_DIAGNOSTICO
            - AGUARDANDO_APROVACAO
            - APROVADA
            - AGUARDANDO_AQUISICAO
            - EM_EXECUCAO
            - FINALIZADA
            - ENTREGUE
            - CANCELADA
            - DEVOLVIDO
        clienteId:
          type: integer
          format: int64
          description: Identificador do cliente
        clienteNomeSocial:
          type: string
          description: Nome social do cliente
        clienteDocumento:
          type: string
          description: Documento do cliente
        veiculoId:
          type: integer
          format: int64
          description: Identificador do veículo
        veiculoPlaca:
          type: string
          description: Placa do veículo
        complexidade:
          type: string
          description: Complexidade da OS
        sintomas:
          type: string
          description: Descrição dos sintomas
        tagChave:
          type: string
          description: Tag chave da OS
        criadaEm:
          type: string
          format: date-time
          description: Data e hora de criação da OS
        precoTotal:
          type: number
          format: decimal
          description: Preço total da OS
  page:
    type: integer
    description: Número da página atual
  size:
    type: integer
    description: Tamanho da página
  totalElements:
    type: integer
    format: int64
    description: Total de elementos
  totalPages:
    type: integer
    description: Total de páginas