type: object
properties:
  nomeSocial:
    type: string
    description: Nome pelo qual uma pessoa deseja ser identificada e tratada no convívio social, ou nome fantasia
    example: "Maria Oliveira"

  nome:
    type: string
    description: Nome completo do cliente, ou razão social
    example: "Marcos Antônio Oliveira"

  tipoDocumento:
    type: string
    description: Tipo do documento de identificação ( CPF | CNPJ )
    enum:
      - CPF
      - CNPJ
    example: "CPF"

  documento:
    type: string
    description: Número do documento de identificação
    example: "55563271064"

  email:
    type: string
    description: Endereço de e-mail do cliente
    example: "maria.oliveira@email.com"

  telefone:
    type: string
    description: Número de telefone para contato
    example: "11988887777"

  contatoWhatsApp:
    type: boolean
    description: Indica se o telefone é WhatsApp
    example: false

  endereco:
    type: object
    description: Endereço residencial do cliente
    properties:
      logradouro:
        type: string
        description: Nome da rua ou avenida
        example: "Avenida Brasil"
      numero:
        type: string
        description: Número do imóvel
        example: "456"
      complemento:
        type: string
        description: Complemento do endereço ( Apto, Bloco...)
        example: "Casa"
      bairro:
        type: string
        description: Bairro do endereço
        example: "Jardim América"
      cidade:
        type: string
        description: Cidade do endereço
        example: "São Paulo"
      uf:
        type: string
        description: Unidade Federativa (Estado)
        example: "SP"
      cep:
        type: string
        description: Código Postal (CEP)
        example: "01432000"