type: object
required:
  - placa
  - tagChave
  - servicosDesejados
properties:
  placa:
    type: string
    description: Placa do veículo
  sintomas:
    type: string
    description: Descrição dos sintomas relatados
  tagChave:
    type: string
    description: Tag chave da OS
  servicosDesejados:
    type: array
    description: Lista de IDs dos serviços desejados
    items:
      type: integer
      format: int64