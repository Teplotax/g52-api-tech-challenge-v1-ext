type: object
properties:
  id:
    type: integer
    format: int64
    description: Identificador da OS
  status:
    type: string
    description: Status atual da OS
    enum:
      - RECEBIDA
      - EM_DIAGNOSTICO
      - AGUARDANDO_APROVACAO
      - APROVADA
      - AGUARDANDO_AQUISICAO
      - EM_EXECUCAO
      - FINALIZADA
      - ENTREGUE
      - CANCELADA
      - DEVOLVIDO
  clienteId:
    type: integer
    format: int64
    description: Identificador do cliente
  clienteNomeSocial:
    type: string
    description: Nome social do cliente
  clienteDocumento:
    type: string
    description: Documento do cliente
  veiculoId:
    type: integer
    format: int64
    description: Identificador do veículo
  veiculoPlaca:
    type: string
    description: Placa do veículo
  complexidade:
    type: string
    description: Complexidade da OS
  sintomas:
    type: string
    description: Descrição dos sintomas
  tagChave:
    type: string
    description: Tag chave da OS
  criadaEm:
    type: string
    format: date-time
    description: Data e hora de criação da OS
  precoTotal:
    type: number
    format: decimal
    description: Preço total da OS
  precoServicosDesejados:
    type: number
    format: decimal
    description: Preço total dos serviços desejados
  precoServicosNecessarios:
    type: number
    format: decimal
    description: Preço total dos serviços necessários
  precoServicosAdicionais:
    type: number
    format: decimal
    description: Preço total dos serviços adicionais
  justificativaNecessarios:
    type: string
    description: Justificativa dos serviços necessários
  justificativaAdicionais:
    type: string
    description: Justificativa dos serviços adicionais
  servicosDesejados:
    $ref: '#/definitions/ServicoOSAprovadoList'
  servicosNecessarios:
    $ref: '#/definitions/ServicoOSAprovadoList'
  servicosAdicionais:
    $ref: '#/definitions/ServicoOSAprovadoList'
  historico:
    type: array
    description: Histórico de mudanças de status
    items:
      type: object
      properties:
        status:
          type: string
          description: Status registrado
        createdAt:
          type: string
          format: date-time
          description: Data e hora do registro
definitions:
  ServicoOSAprovadoList:
    type: array
    items:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Identificador do serviço na OS
        servico:
          type: string
          description: Nome do serviço
        aprovado:
          type: boolean
          description: Indica se o serviço foi aprovado pelo cliente
        precoTotal:
          type: number
          format: decimal
          description: Preço total do serviço
        precoHorasTecnicas:
          type: number
          format: decimal
          description: Preço das horas técnicas
        pecas:
          type: array
          items:
            type: object
            properties:
              peca:
                type: string
              ean:
                type: string
              quantidade:
                type: integer
              precoUnitario:
                type: number
                format: decimal
              precoTotal:
                type: number
                format: decimal
        insumos:
          type: array
          items:
            type: object
            properties:
              insumo:
                type: string
              ean:
                type: string
              quantidade:
                type: integer
              precoUnitario:
                type: number
                format: decimal
              precoTotal:
                type: number
                format: decimal