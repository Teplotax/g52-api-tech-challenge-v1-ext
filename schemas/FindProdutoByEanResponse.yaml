type: object
properties:
  id:
    type: integer
    description: Identificador do produto
  sku:
    type: string
    description: Código SKU do produto
  ean:
    type: string
    description: Código EAN do produto
  nome:
    type: string
    description: Nome do produto
  tipoProduto:
    type: string
    enum: [PECA, INSUMO]
    description: Tipo do produto
  preco:
    type: number
    format: double
    description: Preço unitário
  estoque:
    type: integer
    description: Quantidade em estoque
  estoqueReservado:
    type: integer
    description: Quantidade reservada para ordens em andamento
  estoqueMinimo:
    type: integer
    description: Quantidade mínima em estoque